<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SmartDebt System</title>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, collection, addDoc, query, where, onSnapshot, updateDoc, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

const firebaseConfig = {
  apiKey: "AIzaSyB4NeM9zeHT4SZEPv_pdAENHoZAi_MtDlw",
  authDomain: "smartdebt-system.firebaseapp.com",
  projectId: "smartdebt-system",
  storageBucket: "smartdebt-system.firebasestorage.app",
  messagingSenderId: "735623275511",
  appId: "1:735623275511:web:958e8c53470777745804f2"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const storage = getStorage(app);

let editId = null;
let semuaData = [];

window.login = async function(){
    let email = document.getElementById("email").value;
    let password = document.getElementById("password").value;

    await signInWithEmailAndPassword(auth, email, password);

    document.getElementById("loginDiv").style.display="none";
    document.getElementById("app").style.display="block";

    tampil();
}


window.tambah = async function(){
    let nama = document.getElementById("nama").value;
    let jumlah = Number(document.getElementById("jumlah").value);
    let persen = Number(document.getElementById("persen").value);
    let tanggal = document.getElementById("tanggal").value;
    let tipe = document.getElementById("tipe").value;
    let lama = Number(document.getElementById("lama").value);
    let file = document.getElementById("foto").files[0];

    // ✅ ambil UID user (WAJIB)
    let userId = auth.currentUser.uid;

    let total = jumlah + (jumlah * persen / 100);
    let cicilan = Math.round(total / lama);

    let tgl = new Date(tanggal);

    if(tipe == "mingguan"){
        tgl.setDate(tgl.getDate() + (lama * 7));
    }else{
        tgl.setMonth(tgl.getMonth() + lama);
    }

    let jatuhTempo = tgl.toISOString().split('T')[0];

    let buktiURL = "";

    // ✅ upload file ke folder user masing-masing
    if(file){
        const storageRef = ref(storage, 'bukti/' + userId + '/' + file.name);
        await uploadBytes(storageRef, file);
        buktiURL = await getDownloadURL(storageRef);
    }

    // ✅ simpan ke firestore
    await addDoc(collection(db, "smartdebt"), {
        nama,
        jumlah,
        persen,
        total,
        cicilan,
        tanggal,
        tipe,
        lama,
        jatuh: jatuhTempo,
        bukti: buktiURL,
        status: "belum",
        userId // WAJIB sesuai rules
    });

    // 🔄 reset form biar bersih setelah tambah
    document.getElementById("nama").value = "";
    document.getElementById("jumlah").value = "";
    document.getElementById("persen").value = "";
    document.getElementById("tanggal").value = "";
    document.getElementById("lama").value = "";
    document.getElementById("foto").value = "";

    alert("Data berhasil ditambahkan ✅");
}

window.editData = function(id,nama,jumlah,persen,tanggal,tipe,lama){
    document.getElementById("nama").value = nama;
    document.getElementById("jumlah").value = jumlah;
    document.getElementById("persen").value = persen;
    document.getElementById("tanggal").value = tanggal;
    document.getElementById("tipe").value = tipe;
    document.getElementById("lama").value = lama;

    editId = id;
    document.getElementById("btnTambah").style.display="none";
    document.getElementById("btnUpdate").style.display="inline";
}

window.updateData = async function(){
    let nama = document.getElementById("nama").value;
    let jumlah = Number(document.getElementById("jumlah").value);
    let persen = Number(document.getElementById("persen").value);
    let tanggal = document.getElementById("tanggal").value;
    let tipe = document.getElementById("tipe").value;
    let lama = Number(document.getElementById("lama").value);

    let total = jumlah + (jumlah * persen / 100);
    let cicilan = Math.round(total / lama);

    let tgl = new Date(tanggal);

    if(tipe == "mingguan"){
        tgl.setDate(tgl.getDate() + (lama * 7));
    }else{
        tgl.setMonth(tgl.getMonth() + lama);
    }

    let jatuhTempo = tgl.toISOString().split('T')[0];

    await updateDoc(doc(db, "smartdebt", editId), {
        nama, jumlah, persen, total, cicilan,
        tanggal, tipe, lama, jatuh: jatuhTempo
    });

    editId = null;
    document.getElementById("btnTambah").style.display="inline";
    document.getElementById("btnUpdate").style.display="none";
}

window.lunas = async function(id){
    await updateDoc(doc(db, "smartdebt", id), { status: "lunas" });
}

window.hapus = async function(id){
    await deleteDoc(doc(db, "smartdebt", id));
}

function getWarna(jatuh){
    let today = new Date();
    let jatuhDate = new Date(jatuh);
    let diff = (jatuhDate - today) / (1000 * 60 * 60 * 24);

    if(diff < 0) return "merah";
    if(diff <= 3) return "merah";
    if(diff <= 7) return "kuning";
    return "hijau";
}

function tampil(){
    let userId = auth.currentUser.uid;
const q = query(collection(db, "smartdebt"), where("userId","==",userId));
    onSnapshot(q, (snap)=>{
        let html="";
        let totalPiutang=0;
        semuaData=[];

        snap.forEach((docSnap)=>{
            let d = docSnap.data();
            let id = docSnap.id;

            semuaData.push({id,...d});

            if(d.status=="belum"){
                totalPiutang += d.total;
            }

            let warna = getWarna(d.jatuh);

            html += `
            <tr class="${warna}">
            <td>${d.nama}</td>
            <td>${d.jumlah}</td>
            <td>${d.persen}%</td>
            <td>${d.total}</td>
            <td>${d.cicilan}</td>
            <td>${d.tipe}</td>
            <td>${d.lama}</td>
            <td>${d.jatuh}</td>
            <td>${d.status}</td>
            <td>${d.bukti ? `<img src="${d.bukti}" width="40">` : '-'}</td>
            <td>
            <button onclick="editData('${id}','${d.nama}','${d.jumlah}','${d.persen}','${d.tanggal}','${d.tipe}','${d.lama}')">Edit</button>
            <button onclick="lunas('${id}')">Lunas</button>
            <button onclick="hapus('${id}')">Hapus</button>
            </td>
            </tr>
            `;
        });

        document.getElementById("data").innerHTML = html;
        document.getElementById("total").innerText = totalPiutang;
        buatGrafik();
    });
}

function buatGrafik(){
    let belum=0, lunas=0;

    semuaData.forEach(d=>{
        if(d.status=="belum") belum++;
        else lunas++;
    });

    const canvas = document.getElementById("grafik");
    const ctx = canvas.getContext("2d");

    ctx.clearRect(0,0,300,150);

    ctx.fillStyle = "red";
    ctx.fillRect(50,150-belum*20,50,belum*20);
    ctx.fillStyle = "black";
    ctx.fillText("Belum",50,140);

    ctx.fillStyle = "green";
    ctx.fillRect(150,150-lunas*20,50,lunas*20);
    ctx.fillStyle = "black";
    ctx.fillText("Lunas",150,140);
}
</script>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;

  background:
    linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)),
    url("https://res.cloudinary.com/dkisbfx29/image/upload/v1774657554/vb4ujfzynsrs7rumtaku.png");

  background-size: cover;
  background-position: center;
  background-attachment: fixed;
}

.container {
width:95%;
margin:auto;
padding:10px;
}

.card {
background: rgba(255,255,255,0.95);
padding:15px;
margin-top:10px;
border-radius:12px;
box-shadow:0 4px 10px rgba(0,0,0,0.3);
}

input, select, button {
padding:10px;
margin:5px;
border-radius:6px;
border:1px solid #ccc;
}

button {
background:#2980b9;
color:white;
border:none;
}

table {
width:100%;
border-collapse: collapse;
background:white;
}

th, td {
border:1px solid #ddd;
padding:8px;
text-align:center;
}

.merah { background:#ffcccc; }
.kuning { background:#fff5cc; }
.hijau { background:#ccffcc; }
</style>
</head>

<body>

<div class="container">

<h2 style="color:white;">SmartDebt System</h2>

<div class="card" id="loginDiv">
<h3>Login Admin</h3>
<input type="email" id="email" placeholder="Email">
<input type="password" id="password" placeholder="Password">
<button onclick="login()">Login</button>
</div>

<div id="app" style="display:none;">

<div class="card">
<input type="text" id="nama" placeholder="Nama">
<input type="number" id="jumlah" placeholder="Pinjaman">
<input type="number" id="persen" placeholder="Persen">
<input type="date" id="tanggal">

<select id="tipe">
<option value="mingguan">Mingguan</option>
<option value="bulanan">Bulanan</option>
</select>

<input type="number" id="lama" placeholder="Lama Cicilan">
<input type="file" id="foto">

<button onclick="tambah()" id="btnTambah">Tambah</button>
<button onclick="updateData()" id="btnUpdate" style="display:none;">Update</button>
</div>

<div class="card">
Total Piutang: <b id="total">0</b>
</div>

<canvas id="grafik" width="300" height="150"></canvas>

<div class="card">
<table>
<thead>
<tr>
<th>Nama</th>
<th>Pinjaman</th>
<th>%</th>
<th>Total</th>
<th>Cicilan</th>
<th>Tipe</th>
<th>Lama</th>
<th>Jatuh Tempo</th>
<th>Status</th>
<th>Bukti</th>
<th>Aksi</th>
</tr>
</thead>
<tbody id="data"></tbody>
</table>
</div>

</div>

</div>

</body>
</html>
