<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SmartDebt System</title>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, collection, addDoc, query, where, onSnapshot, updateDoc, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

const firebaseConfig = {
  apiKey: "AIzaSyB4NeM9zeHT4SZEPv_pdAENHoZAi_MtDlw",
  authDomain: "smartdebt-system.firebaseapp.com",
  projectId: "smartdebt-system",
  storageBucket: "smartdebt-system.firebasestorage.app",
  messagingSenderId: "735623275511",
  appId: "1:735623275511:web:958e8c53470777745804f2"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const storage = getStorage(app);

let editId = null;
let semuaData = [];

window.login = async function(){
    let email = document.getElementById("email").value;
    let password = document.getElementById("password").value;

    await signInWithEmailAndPassword(auth, email, password);

    document.getElementById("loginDiv").style.display="none";
    document.getElementById("app").style.display="block";

    tampil();
}

window.tambah = async function(){
    let nama = document.getElementById("nama").value;
    let jumlah = Number(document.getElementById("jumlah").value);
    let persen = Number(document.getElementById("persen").value);
    let tanggal = document.getElementById("tanggal").value;
    let jatuh = document.getElementById("jatuh").value;
    let file = document.getElementById("foto").files[0];
    let user = auth.currentUser.email;

    let total = jumlah + (jumlah * persen / 100);
    let buktiURL = "";

    if(file){
        try{
            const storageRef = ref(storage, 'bukti/' + file.name);
            await uploadBytes(storageRef, file);
            buktiURL = await getDownloadURL(storageRef);
        }catch(e){
            alert("Upload foto gagal");
        }
    }

    await addDoc(collection(db, "smartdebt"), {
        nama, jumlah, persen, total, tanggal, jatuh,
        bukti: buktiURL,
        status: "belum",
        user
    });
}

window.editData = function(id,nama,jumlah,persen,tanggal,jatuh){
    document.getElementById("nama").value = nama;
    document.getElementById("jumlah").value = jumlah;
    document.getElementById("persen").value = persen;
    document.getElementById("tanggal").value = tanggal;
    document.getElementById("jatuh").value = jatuh;

    editId = id;
    document.getElementById("btnTambah").style.display="none";
    document.getElementById("btnUpdate").style.display="inline";
}

window.updateData = async function(){
    let nama = document.getElementById("nama").value;
    let jumlah = Number(document.getElementById("jumlah").value);
    let persen = Number(document.getElementById("persen").value);
    let tanggal = document.getElementById("tanggal").value;
    let jatuh = document.getElementById("jatuh").value;

    let total = jumlah + (jumlah * persen / 100);

    await updateDoc(doc(db, "smartdebt", editId), {
        nama, jumlah, persen, total, tanggal, jatuh
    });

    editId = null;
    document.getElementById("btnTambah").style.display="inline";
    document.getElementById("btnUpdate").style.display="none";
}

window.lunas = async function(id){
    await updateDoc(doc(db, "smartdebt", id), { status: "lunas" });
}

window.hapus = async function(id){
    await deleteDoc(doc(db, "smartdebt", id));
}

function tampil(){
    let user = auth.currentUser.email;
    const q = query(collection(db, "smartdebt"), where("user","==",user));

    onSnapshot(q, (snap)=>{
        let html="";
        let totalPiutang=0;
        semuaData=[];

        snap.forEach((docSnap)=>{
            let d = docSnap.data();
            let id = docSnap.id;

            semuaData.push({id,...d});

            if(d.status=="belum"){
                totalPiutang += d.total;
            }

            html += `
            <tr>
            <td>${d.nama}</td>
            <td>${d.jumlah}</td>
            <td>${d.persen}%</td>
            <td>${d.total}</td>
            <td>${d.jatuh}</td>
            <td>${d.status}</td>
            <td>${d.bukti ? `<img src="${d.bukti}" width="40">` : '-'}</td>
            <td>
            <button onclick="editData('${id}','${d.nama}','${d.jumlah}','${d.persen}','${d.tanggal}','${d.jatuh}')">Edit</button>
            <button onclick="lunas('${id}')">Lunas</button>
            <button onclick="hapus('${id}')">Hapus</button>
            </td>
            </tr>
            `;
        });

        document.getElementById("data").innerHTML = html;
        document.getElementById("total").innerText = totalPiutang;
        buatGrafik();
    });
}

window.cariNama = function(){
    let keyword = document.getElementById("cari").value.toLowerCase();
    let html="";

    semuaData.forEach(d=>{
        if(d.nama.toLowerCase().includes(keyword)){
            html += `
            <tr>
            <td>${d.nama}</td>
            <td>${d.jumlah}</td>
            <td>${d.persen}%</td>
            <td>${d.total}</td>
            <td>${d.jatuh}</td>
            <td>${d.status}</td>
            <td>${d.bukti ? `<img src="${d.bukti}" width="40">` : '-'}</td>
            <td>
            <button onclick="editData('${d.id}','${d.nama}','${d.jumlah}','${d.persen}','${d.tanggal}','${d.jatuh}')">Edit</button>
            <button onclick="lunas('${d.id}')">Lunas</button>
            <button onclick="hapus('${d.id}')">Hapus</button>
            </td>
            </tr>
            `;
        }
    });

    document.getElementById("data").innerHTML = html;
}

window.exportPDF = function(){
    let isi = "LAPORAN PIUTANG\n\n";
    semuaData.forEach(d=>{
        isi += `${d.nama} | ${d.total} | ${d.status}\n`;
    });

    let blob = new Blob([isi], {type:"text/plain"});
    let a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "laporan.txt";
    a.click();
}

function buatGrafik(){
    let belum=0, lunas=0;

    semuaData.forEach(d=>{
        if(d.status=="belum") belum++;
        else lunas++;
    });

    const canvas = document.getElementById("grafik");
    const ctx = canvas.getContext("2d");

    ctx.clearRect(0,0,300,150);

    ctx.fillRect(50,150-belum*20,50,belum*20);
    ctx.fillText("Belum",50,140);

    ctx.fillRect(150,150-lunas*20,50,lunas*20);
    ctx.fillText("Lunas",150,140);
}
</script>

<style>
body {
font-family: Arial;
background:#f5f5f5;
padding:20px;
}

#app {
background-image: url('https://res.cloudinary.com/dkisbfx29/image/upload/v1774598344/itpdm60zilltmg2hkqpl.png');
background-size: cover;
background-position: center;
padding:20px;
border-radius:10px;
}

.card {
background: rgba(255,255,255,0.9);
padding:15px;
margin-bottom:10px;
border-radius:10px;
}

input, button {
padding:8px;
margin:5px;
}

table {
width:100%;
border-collapse: collapse;
background:white;
}

th, td {
border:1px solid #ddd;
padding:8px;
text-align:center;
}
</style>
</head>

<body>

<h2>SmartDebt System</h2>

<div class="card" id="loginDiv">
<h3>Login Admin</h3>
<input type="email" id="email" placeholder="Email">
<input type="password" id="password" placeholder="Password">
<button onclick="login()">Login</button>
</div>

<div id="app" style="display:none;">

<div class="card">
<input type="text" id="nama" placeholder="Nama">
<input type="number" id="jumlah" placeholder="Pinjaman">
<input type="number" id="persen" placeholder="Persen">
<input type="date" id="tanggal">
<input type="date" id="jatuh">
<input type="file" id="foto">
<button onclick="tambah()" id="btnTambah">Tambah</button>
<button onclick="updateData()" id="btnUpdate" style="display:none;">Update</button>
</div>

<div class="card">
<input type="text" id="cari" placeholder="Cari Nama">
<button onclick="cariNama()">Cari</button>
</div>

<div class="card">
Total Piutang: <b id="total">0</b>
<button onclick="exportPDF()">Export Laporan</button>
</div>

<canvas id="grafik" width="300" height="150"></canvas>

<div class="card">
<table>
<thead>
<tr>
<th>Nama</th>
<th>Pinjaman</th>
<th>%</th>
<th>Total</th>
<th>Jatuh Tempo</th>
<th>Status</th>
<th>Bukti</th>
<th>Aksi</th>
</tr>
</thead>
<tbody id="data"></tbody>
</table>
</div>

</div>

</body>
</html>
