<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SmartDebt System</title>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, collection, addDoc, query, where, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyB4NeM9zeHT4SZEPv_pdAENHoZAi_MtDlw",
  authDomain: "smartdebt-system.firebaseapp.com",
  projectId: "smartdebt-system",
  storageBucket: "smartdebt-system.firebasestorage.app",
  messagingSenderId: "735623275511",
  appId: "1:735623275511:web:958e8c53470777745804f2"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

window.login = async function(){
    let email = document.getElementById("email").value;
    let password = document.getElementById("password").value;

    await signInWithEmailAndPassword(auth, email, password);

    document.getElementById("loginDiv").style.display="none";
    document.getElementById("app").style.display="block";
    tampil();
}

window.tambah = async function(){
    let nama = document.getElementById("nama").value;
    let jumlah = document.getElementById("jumlah").value;
    let tanggal = document.getElementById("tanggal").value;
    let user = auth.currentUser.email;

    await addDoc(collection(db, "smartdebt"), {
        nama: nama,
        jumlah: jumlah,
        tanggal: tanggal,
        status: "belum",
        user: user
    });

    tampil();
}

function tampil(){
    let user = auth.currentUser.email;

    const q = query(collection(db, "smartdebt"), where("user","==",user));

    onSnapshot(q, (snapshot)=>{
        let html="";
        snapshot.forEach((doc)=>{
            let d = doc.data();
            html += `
            <tr>
            <td>${d.nama}</td>
            <td>${d.jumlah}</td>
            <td>${d.tanggal}</td>
            <td>${d.status}</td>
            </tr>
            `;
        });
        document.getElementById("data").innerHTML=html;
    });
}
</script>

<style>
body { font-family: Arial; background:#f5f5f5; padding:20px; }
.card { background:white; padding:15px; margin-bottom:10px; border-radius:10px; }
input, button { padding:8px; margin:5px; }
table { width:100%; border-collapse: collapse; }
th, td { border:1px solid #ddd; padding:8px; text-align:center; }
</style>
</head>
<body>

<h2>SmartDebt System</h2>

<div class="card" id="loginDiv">
<h3>Login</h3>
<input type="email" id="email" placeholder="Email">
<input type="password" id="password" placeholder="Password">
<button onclick="login()">Login</button>
</div>

<div id="app" style="display:none;">
<div class="card">
<input type="text" id="nama" placeholder="Nama">
<input type="number" id="jumlah" placeholder="Jumlah">
<input type="date" id="tanggal">
<button onclick="tambah()">Tambah Data</button>
</div>

<div class="card">
<table>
<thead>
<tr>
<th>Nama</th>
<th>Jumlah</th>
<th>Tanggal</th>
<th>Status</th>
</tr>
</thead>
<tbody id="data"></tbody>
</table>
</div>
</div>

</body>
</html>
